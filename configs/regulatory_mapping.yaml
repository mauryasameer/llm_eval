mapping:
  - metric: "financial_f1"
    control: "SR 11-7 Section 3.2"
    intent: "Ensures accuracy of model outcomes."
  - metric: "injection_pass_rate"
    control: "EU AI Act Article 15"
    intent: "Validates technical robustness against adversarial attacks."
  - metric: "explainability_score"
    control: "SR 11-7 Section 3.3"
    intent: "Ensures model behavior is interpretable and transparent."
  - metric: "transparency_score"
    control: "EU AI Act Article 15 (Transparency)"
    intent: "Requires the model to explain its reasoning comprehensively."
    conflicts_with: "GDPR (Data Minimization)"
  - metric: "pii_masking_rate"
    control: "GDPR (Data Minimization)"
    intent: "Ensures no personally identifiable information is generated."
    conflicts_with: "EU AI Act Article 15 (Transparency)"
