name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "hf_space/**"       # Only redeploy when Space files change
      - "core/**"           # Or when core evaluator logic changes
      - "configs/**"
      - "reports/templates/**"
      - "data/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Sync to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Install HuggingFace CLI
          pip install -q huggingface_hub

          # Configure git identity
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Clone the Space repo
          git clone https://mauryasameer:${HF_TOKEN}@huggingface.co/spaces/mauryasameer/llm-eval hf_deploy

          # Copy Space files to root of the Space repo
          cp -r hf_space/. hf_deploy/

          # Clean target directories to prevent recursive pasting (e.g., core/core)
          rm -rf hf_deploy/core hf_deploy/configs hf_deploy/data hf_deploy/reports
          mkdir -p hf_deploy/reports/templates hf_deploy/reports/plots

          # Copy fresh directories
          cp -r core      hf_deploy/
          cp -r configs   hf_deploy/
          cp -r data      hf_deploy/
          cp -r reports/templates hf_deploy/reports/ 2>/dev/null || true

          # Commit and push — always force a new SHA so HF rebuilds
          cd hf_deploy
          git add -A
          git commit --allow-empty -m "chore: sync from GitHub $(date +'%Y-%m-%d %H:%M')"
          git push
